spring.application.name=negotiator
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

server.port=8080

negotiation.defaults.strategy=${NEGOTIATION_DEFAULT_STRATEGY:BASELINE}
negotiation.defaults.max-rounds=${NEGOTIATION_DEFAULT_MAX_ROUNDS:8}
negotiation.defaults.risk-of-walkaway=${NEGOTIATION_DEFAULT_RISK_OF_WALKAWAY:0.15}
negotiation.defaults.buyer-profile.ideal-offer.price=${NEGOTIATION_DEFAULT_BUYER_IDEAL_PRICE:90.00}
negotiation.defaults.buyer-profile.ideal-offer.payment-days=${NEGOTIATION_DEFAULT_BUYER_IDEAL_PAYMENT_DAYS:60}
negotiation.defaults.buyer-profile.ideal-offer.delivery-days=${NEGOTIATION_DEFAULT_BUYER_IDEAL_DELIVERY_DAYS:7}
negotiation.defaults.buyer-profile.ideal-offer.contract-months=${NEGOTIATION_DEFAULT_BUYER_IDEAL_CONTRACT_MONTHS:6}
negotiation.defaults.buyer-profile.reservation-offer.price=${NEGOTIATION_DEFAULT_BUYER_RESERVATION_PRICE:120.00}
negotiation.defaults.buyer-profile.reservation-offer.payment-days=${NEGOTIATION_DEFAULT_BUYER_RESERVATION_PAYMENT_DAYS:30}
negotiation.defaults.buyer-profile.reservation-offer.delivery-days=${NEGOTIATION_DEFAULT_BUYER_RESERVATION_DELIVERY_DAYS:30}
negotiation.defaults.buyer-profile.reservation-offer.contract-months=${NEGOTIATION_DEFAULT_BUYER_RESERVATION_CONTRACT_MONTHS:24}
negotiation.defaults.buyer-profile.weights.price=${NEGOTIATION_DEFAULT_BUYER_WEIGHT_PRICE:0.40}
negotiation.defaults.buyer-profile.weights.payment-days=${NEGOTIATION_DEFAULT_BUYER_WEIGHT_PAYMENT_DAYS:0.20}
negotiation.defaults.buyer-profile.weights.delivery-days=${NEGOTIATION_DEFAULT_BUYER_WEIGHT_DELIVERY_DAYS:0.25}
negotiation.defaults.buyer-profile.weights.contract-months=${NEGOTIATION_DEFAULT_BUYER_WEIGHT_CONTRACT_MONTHS:0.15}
negotiation.defaults.buyer-profile.reservation-utility=${NEGOTIATION_DEFAULT_BUYER_RESERVATION_UTILITY:0.00}
negotiation.defaults.bounds.min-price=${NEGOTIATION_DEFAULT_MIN_PRICE:80.00}
negotiation.defaults.bounds.max-price=${NEGOTIATION_DEFAULT_MAX_PRICE:120.00}
negotiation.defaults.bounds.min-payment-days=${NEGOTIATION_DEFAULT_MIN_PAYMENT_DAYS:30}
negotiation.defaults.bounds.max-payment-days=${NEGOTIATION_DEFAULT_MAX_PAYMENT_DAYS:90}
negotiation.defaults.bounds.min-delivery-days=${NEGOTIATION_DEFAULT_MIN_DELIVERY_DAYS:7}
negotiation.defaults.bounds.max-delivery-days=${NEGOTIATION_DEFAULT_MAX_DELIVERY_DAYS:30}
negotiation.defaults.bounds.min-contract-months=${NEGOTIATION_DEFAULT_MIN_CONTRACT_MONTHS:3}
negotiation.defaults.bounds.max-contract-months=${NEGOTIATION_DEFAULT_MAX_CONTRACT_MONTHS:24}
negotiation.defaults.supplier-model.margin-focused=${NEGOTIATION_DEFAULT_SUPPLIER_MARGIN_FOCUSED:0.25}
negotiation.defaults.supplier-model.cashflow-focused=${NEGOTIATION_DEFAULT_SUPPLIER_CASHFLOW_FOCUSED:0.25}
negotiation.defaults.supplier-model.operations-focused=${NEGOTIATION_DEFAULT_SUPPLIER_OPERATIONS_FOCUSED:0.25}
negotiation.defaults.supplier-model.stability-focused=${NEGOTIATION_DEFAULT_SUPPLIER_STABILITY_FOCUSED:0.25}
negotiation.defaults.supplier-model.reservation-utility=${NEGOTIATION_DEFAULT_SUPPLIER_RESERVATION_UTILITY:0.35}
